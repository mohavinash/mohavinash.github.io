<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hormuz Strait — Before & After</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #FAF8F3; }

.container {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  width: 100vw; height: 100vh;
}
.panel { position: relative; }
.panel-label {
  position: absolute; top: 14px; left: 0; right: 0; z-index: 10;
  text-align: center; font-size: 18px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: #1a1a1a; text-shadow: 0 1px 4px rgba(255,255,255,0.9);
}
.panel-sub {
  position: absolute; top: 40px; left: 0; right: 0; z-index: 10;
  text-align: center; font-size: 14px; color: #5a5a5a;
  text-shadow: 0 1px 3px rgba(255,255,255,0.9);
}
.panel-sub.red { color: #8b2020; font-weight: 700; }
.map { width: 100%; height: 100%; }
.divider {
  position: absolute; top: 0; bottom: 0; right: 0;
  width: 2px; background: #1a1a1a; z-index: 10;
}
.source-bar {
  display: none; /* Source text moved to the chronicle page for readability */
}

/* Ship icon markers */
.ship-marker {
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.ship-marker svg { filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15)); }
</style>
</head>
<body>

<div class="container">
  <div class="panel">
    <div class="panel-label">February 27</div>
    <div class="panel-sub">95 vessels · 53 tankers (PortWatch)</div>
    <div id="map-before" class="map"></div>
    <div class="divider"></div>
  </div>
  <div class="panel">
    <div class="panel-label">March 19</div>
    <div class="panel-sub red">9 vessels (PortWatch) · US weighs troops + island seizure · Iran proposes tolls</div>
    <div id="map-after" class="map"></div>
  </div>
</div>

<div class="source-bar">
  Source: IMF PortWatch ArcGIS API (Feb 27: 95 total, 53 tankers; Mar 15: 9 vessels) · Windward Maritime Intelligence unavailable · Map: Mapbox GL
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoibW9oYXZpbmFzaCIsImEiOiJjbW1idzc1dzIwMDF5MnBzYjF6Z2FmbmtiIn0.e6RM_uhmCa6etbMWrk-vnQ';

const HORMUZ_CENTER = [55.8, 26.1];
const ZOOM = 6.8;

// TSS lanes — L-shaped: vertical south leg (Gulf of Oman) + sharp bend + horizontal west leg (Persian Gulf)
// Lanes: inverted V, shifted east, wide-narrow-wide
// Inbound lane (inner/south side)
const LANE_INBOUND = [
  // Right leg — Gulf of Oman
  [56.82, 25.45], [56.78, 25.70], [56.72, 25.95], [56.68, 26.12], [56.60, 26.28],
  // Narrows
  [56.48, 26.42], [56.28, 26.50], [56.12, 26.52],
  // Left leg — Persian Gulf
  [55.82, 26.46], [55.45, 26.32], [55.1, 26.18], [54.6, 26.00]
];
// Outbound lane (outer/north side)
const LANE_OUTBOUND = [
  [54.6, 26.14], [55.1, 26.34], [55.45, 26.48], [55.82, 26.58],
  // Narrows
  [56.12, 26.62], [56.28, 26.60], [56.48, 26.54],
  // Right leg
  [56.60, 26.40], [56.68, 26.25], [56.72, 26.08], [56.78, 25.82], [56.82, 25.60]
];

// Only add labels Mapbox doesn't already show. Bandar Abbas, Khasab, Fujairah, Abu Musa
// are all rendered by the Mapbox base map — no need to duplicate them.
const LOCATIONS = [
  { coord: [56.05, 26.05], name: 'Musandam Peninsula', type: 'geo' },
];

// SVG ship icons
function tankerSVG(color, size) {
  return `<svg width="${size}" height="${size * 0.4}" viewBox="0 0 30 12" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 8 L5 10 L25 10 L28 8 L28 5 L26 3 L22 2 L8 2 L4 3 L2 5 Z" fill="${color}" stroke="${color}" stroke-width="0.5"/>
    <rect x="10" y="3" width="3" height="4" rx="0.5" fill="white" opacity="0.4"/>
    <rect x="15" y="3" width="3" height="4" rx="0.5" fill="white" opacity="0.4"/>
    <rect x="20" y="3" width="3" height="4" rx="0.5" fill="white" opacity="0.3"/>
    <rect x="7" y="1" width="2" height="3" rx="0.5" fill="${color}"/>
  </svg>`;
}

function cargoSVG(color, size) {
  return `<svg width="${size}" height="${size * 0.35}" viewBox="0 0 24 10" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 7 L4 9 L20 9 L22 7 L22 4 L20 2 L4 2 L2 4 Z" fill="${color}" stroke="${color}" stroke-width="0.5"/>
    <rect x="6" y="3" width="4" height="3" rx="0.3" fill="white" opacity="0.3"/>
    <rect x="12" y="3" width="4" height="3" rx="0.3" fill="white" opacity="0.25"/>
  </svg>`;
}

function mineSVG() {
  return `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="10" cy="10" r="6" fill="#8b2020" opacity="0.2"/>
    <circle cx="10" cy="10" r="6" stroke="#8b2020" stroke-width="1.5" fill="none"/>
    <circle cx="10" cy="10" r="2" fill="#8b2020"/>
    <line x1="10" y1="3" x2="10" y2="5" stroke="#8b2020" stroke-width="1.5"/>
    <line x1="10" y1="15" x2="10" y2="17" stroke="#8b2020" stroke-width="1.5"/>
    <line x1="3" y1="10" x2="5" y2="10" stroke="#8b2020" stroke-width="1.5"/>
    <line x1="15" y1="10" x2="17" y2="10" stroke="#8b2020" stroke-width="1.5"/>
  </svg>`;
}

function generateShipPositions(count, seed) {
  const ships = [];
  let s = seed;
  const rng = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };

  // Water corridor follows the BEND around Musandam
  // Ships come from SOUTH (Gulf of Oman), curve NORTH, then head WEST (Persian Gulf)
  // The bend at Musandam is the key — NOT a straight diagonal
  const corridor = [
    // Shape: INVERTED V (∧) — narrows at top, both legs slope DOWN
    // Shift everything ~0.15 lng east to keep clear of Iran coast on left
    // RIGHT LEG: Gulf of Oman — WIDE mouth, matching left leg width
    { lng: 56.85, lat: 25.50, hw: 0.50 },
    { lng: 56.82, lat: 25.65, hw: 0.48 },
    { lng: 56.80, lat: 25.80, hw: 0.42 },
    { lng: 56.76, lat: 25.95, hw: 0.34 },
    { lng: 56.72, lat: 26.08, hw: 0.24 },
    { lng: 56.65, lat: 26.22, hw: 0.14 },
    { lng: 56.58, lat: 26.32, hw: 0.07 },
    // THE NARROWS — top of the V, pinch point (tight)
    { lng: 56.52, lat: 26.42, hw: 0.03 },
    { lng: 56.38, lat: 26.52, hw: 0.03 },
    { lng: 56.22, lat: 26.55, hw: 0.03 },
    { lng: 56.05, lat: 26.55, hw: 0.03 },
    // LEFT LEG: Persian Gulf — WIDE, heading SW downhill from narrows
    { lng: 55.75, lat: 26.48, hw: 0.08 },
    { lng: 55.45, lat: 26.38, hw: 0.18 },
    { lng: 55.15, lat: 26.25, hw: 0.30 },
    { lng: 54.80, lat: 26.10, hw: 0.40 },
    { lng: 54.40, lat: 25.95, hw: 0.45 },
  ];

  for (let i = 0; i < count; i++) {
    // Pick a random point along the corridor
    const segIdx = Math.floor(rng() * (corridor.length - 1));
    const t = rng(); // interpolation within segment
    const a = corridor[segIdx], b = corridor[segIdx + 1];
    const lng = a.lng + t * (b.lng - a.lng) + (rng() - 0.5) * a.hw * 0.8;
    const lat = a.lat + t * (b.lat - a.lat) + (rng() - 0.5) * a.hw;
    const isTanker = rng() < 0.55;
    // Ship heading follows flow direction of this corridor segment
    const flowAngle = Math.atan2(b.lat - a.lat, b.lng - a.lng) * 180 / Math.PI;
    const heading = flowAngle + (rng() - 0.5) * 25;
    ships.push({
      lng, lat, isTanker, heading,
      size: isTanker ? 26 + rng() * 8 : 18 + rng() * 6,
    });
  }
  return ships;
}

// Mines in the narrows — between lat 26.4-26.65, lng 55.8-56.6
// Mines in the narrows (shifted east with corridor)
const MINE_POSITIONS = [
  [56.60, 26.35], [56.50, 26.44], [56.40, 26.50], [56.28, 26.54],
  [56.15, 26.56], [56.55, 26.40], [56.35, 26.52], [56.0, 26.56]
];

function createMap(containerId, shipCount, showMines, seed) {
  const map = new mapboxgl.Map({
    container: containerId,
    style: 'mapbox://styles/mapbox/light-v11',
    center: HORMUZ_CENTER,
    zoom: ZOOM,
    attributionControl: false,
    interactive: false,
    fadeDuration: 0,
  });

  map.on('load', () => {
    // Shipping lanes
    const laneColor = showMines ? '#8b2020' : '#2d6a2e';
    map.addSource('lane-in', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: LANE_INBOUND } }
    });
    map.addSource('lane-out', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: LANE_OUTBOUND } }
    });
    map.addLayer({
      id: 'lane-in', type: 'line', source: 'lane-in',
      paint: { 'line-color': laneColor, 'line-width': 1.5, 'line-dasharray': [4, 3], 'line-opacity': 0.5 }
    });
    map.addLayer({
      id: 'lane-out', type: 'line', source: 'lane-out',
      paint: { 'line-color': laneColor, 'line-width': 1.5, 'line-dasharray': [4, 3], 'line-opacity': 0.5 }
    });

    // Ship markers as real SVG icons
    const ships = generateShipPositions(shipCount, seed);
    ships.forEach(ship => {
      const el = document.createElement('div');
      el.className = 'ship-marker';
      el.style.transform = `rotate(${ship.heading}deg)`;
      const color = ship.isTanker ? '#1a2744' : '#5a5a5a';
      el.innerHTML = ship.isTanker
        ? tankerSVG(color, ship.size)
        : cargoSVG(color, ship.size);
      new mapboxgl.Marker({ element: el, anchor: 'center' })
        .setLngLat([ship.lng, ship.lat])
        .addTo(map);
    });

    // Mine markers
    if (showMines) {
      MINE_POSITIONS.forEach(coord => {
        const el = document.createElement('div');
        el.className = 'ship-marker';
        el.innerHTML = mineSVG();
        new mapboxgl.Marker({ element: el, anchor: 'center' })
          .setLngLat(coord)
          .addTo(map);
      });

      // "Mines reported" label
      const mineLabel = document.createElement('div');
      mineLabel.style.cssText = `font-size:13px; color:#8b2020; font-family:'Courier New',monospace;
        font-style:italic; font-weight:700; text-shadow:0 1px 3px rgba(255,255,255,0.9); white-space:nowrap;`;
      mineLabel.textContent = 'mines reported';
      new mapboxgl.Marker({ element: mineLabel, anchor: 'top' })
        .setLngLat([56.0, 26.25])
        .addTo(map);
    }

    // Location labels
    LOCATIONS.forEach(loc => {
      const el = document.createElement('div');
      el.style.cssText = `font-size:12px; color:#666; font-family:'Courier New',monospace;
        letter-spacing:0.08em; text-shadow:0 1px 3px rgba(255,255,255,0.9); white-space:nowrap;
        font-style:italic;`;
      el.textContent = loc.name;
      new mapboxgl.Marker({ element: el, anchor: 'top' })
        .setLngLat(loc.coord)
        .addTo(map);
    });

    // "21 mi" label
    const label21 = document.createElement('div');
    label21.style.cssText = `font-size:13px; color:#1a1a1a; font-weight:700; font-family:'Courier New',monospace;
      background:rgba(255,255,255,0.8); padding:2px 6px; border:1px solid #c8c4bc;`;
    label21.textContent = '21 mi';
    new mapboxgl.Marker({ element: label21, anchor: 'center' })
      .setLngLat([56.42, 26.53])
      .addTo(map);
  });

  return map;
}

const mapBefore = createMap('map-before', 65, false, 42);
const mapAfter = createMap('map-after', 9, true, 99);
</script>

</body>
</html>
